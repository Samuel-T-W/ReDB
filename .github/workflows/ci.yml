name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Regenerate the web TypeScript trace types from the Java model and fail if
      # the committed copy is stale (someone changed src/trace/*.java without
      # running `mvn process-classes`). Kept before "Run tests" so it reports
      # independently of the test step.
      - name: Check generated trace types are in sync
        run: |
          mvn -q process-classes
          git diff --exit-code -- web/src/types/trace.ts

      - name: Run tests
        run: mvn test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
